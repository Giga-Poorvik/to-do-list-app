<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>do waise</title>

  <!-- Google Font: Inter (300–700) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- App Stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-logo">
      <span class="logo-icon" aria-hidden="true">✅</span>
      <h1 class="header-title">do waise</h1>
    </div>

    <div class="header-search">
      <input
        type="text"
        id="search-input"
        placeholder="Search tasks by title..."
        aria-label="Search tasks by title"
      >
    </div>

    <button id="add-task-btn" class="btn-primary" aria-label="Add a new task">
      <span class="btn-icon" aria-hidden="true">+</span>
      <span class="btn-label">Add Task</span>
    </button>
  </header>

  <!-- ===== Dashboard (3-column grid) ===== -->
  <main class="dashboard">

    <!-- Column 1 – To Do -->
    <section class="column todo-column" aria-label="To Do tasks">
      <div class="column-header">
        <h2 class="column-title">
          To Do
          <span id="todo-count" class="task-count">0</span>
        </h2>
        <div class="sort-controls">
          <button id="sort-priority-btn" class="btn-sort" aria-label="Sort tasks by priority">
            Sort by Priority
          </button>
          <button id="sort-date-btn" class="btn-sort" aria-label="Sort tasks by due date">
            Sort by Due Date
          </button>
        </div>
      </div>
      <div id="todo-list" class="task-list" role="list" aria-label="To Do task list"></div>
    </section>

    <!-- Column 2 – Completed -->
    <section class="column completed-column" aria-label="Completed tasks">
      <div class="column-header">
        <h2 class="column-title">
          Completed
          <span id="completed-count" class="task-count">0</span>
        </h2>
      </div>
      <div id="completed-list" class="task-list" role="list" aria-label="Completed task list"></div>
    </section>

    <!-- Column 3 – Streak / Activity -->
    <section class="column streak-column" aria-label="Activity and streaks">
      <div class="column-header">
        <h2 class="column-title">Activity</h2>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-value" id="current-streak">0</span>
          <span class="stat-label">Current Streak</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="longest-streak">0</span>
          <span class="stat-label">Longest Streak</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="total-completed">0</span>
          <span class="stat-label">Total Completed</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="total-pending">0</span>
          <span class="stat-label">Pending Tasks</span>
        </div>
      </div>

      <!-- Streak grid (populated by JS) -->
      <div id="streak-grid" class="streak-grid" aria-label="Task completion streak grid"></div>

      <!-- Legend -->
      <div class="streak-legend">
        <span class="legend-label">Less</span>
        <span class="legend-box level-0" aria-label="No activity"></span>
        <span class="legend-box level-1" aria-label="Low activity"></span>
        <span class="legend-box level-2" aria-label="Medium activity"></span>
        <span class="legend-box level-3" aria-label="High activity"></span>
        <span class="legend-box level-4" aria-label="Very high activity"></span>
        <span class="legend-label">More</span>
      </div>

      <!-- Month labels -->
      <div id="month-labels" class="month-labels" aria-hidden="true"></div>
    </section>
  </main>

  <!-- ===== Add Task Modal ===== -->
  <div id="task-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-add-title" hidden>
    <div class="modal-overlay" data-modal-close aria-hidden="true"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-add-title">Add New Task</h2>
        <button class="modal-close" aria-label="Close modal">&times;</button>
      </div>

      <form id="task-form" novalidate>
        <div class="form-group">
          <label for="task-title" class="sr-only">Task title</label>
          <input
            type="text"
            id="task-title"
            placeholder="Task title"
            aria-label="Task title"
            required
          >
        </div>

        <div class="form-group">
          <label for="task-description" class="sr-only">Task description</label>
          <textarea
            id="task-description"
            placeholder="Add a description..."
            aria-label="Task description"
            rows="3"
          ></textarea>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="task-priority" class="sr-only">Priority</label>
            <select id="task-priority" aria-label="Task priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-due-date" class="sr-only">Due date</label>
            <input
              type="date"
              id="task-due-date"
              aria-label="Task due date"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="task-due-time" class="sr-only">Due time</label>
          <input
            type="time"
            id="task-due-time"
            aria-label="Task due time"
          >
        </div>

        <button type="submit" class="btn-primary btn-submit" id="add-task-submit">
          Add Task
        </button>
      </form>
    </div>
  </div>

  <!-- ===== Edit Task Modal ===== -->
  <div id="edit-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-edit-title" hidden>
    <div class="modal-overlay" data-modal-close aria-hidden="true"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-edit-title">Edit Task</h2>
        <button class="modal-close" aria-label="Close edit modal">&times;</button>
      </div>

      <form id="edit-task-form" novalidate>
        <!-- Hidden task id -->
        <input type="hidden" id="edit-task-id">

        <div class="form-group">
          <label for="edit-task-title" class="sr-only">Task title</label>
          <input
            type="text"
            id="edit-task-title"
            placeholder="Task title"
            aria-label="Task title"
            required
          >
        </div>

        <div class="form-group">
          <label for="edit-task-description" class="sr-only">Task description</label>
          <textarea
            id="edit-task-description"
            placeholder="Add a description..."
            aria-label="Task description"
            rows="3"
          ></textarea>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label for="edit-task-priority" class="sr-only">Priority</label>
            <select id="edit-task-priority" aria-label="Task priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label for="edit-task-due-date" class="sr-only">Due date</label>
            <input
              type="date"
              id="edit-task-due-date"
              aria-label="Task due date"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="edit-task-due-time" class="sr-only">Due time</label>
          <input
            type="time"
            id="edit-task-due-time"
            aria-label="Task due time"
          >
        </div>

        <button type="submit" class="btn-primary btn-submit" id="edit-task-submit">
          Save Changes
        </button>
      </form>
    </div>
  </div>

  <!-- App Script -->
  <script src="/static/js/app.js" defer></script>
</body>
</html>
